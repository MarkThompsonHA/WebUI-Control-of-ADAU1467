; =============================================================================
; ADAU1467 Web Control - PlatformIO Configuration
; =============================================================================
; ESP32 DoIt DevKit V1 + ADAU1467 SPI Control
; Web-based UI for real-time DSP parameter manipulation
; =============================================================================

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; --- Filesystem for web UI ---
board_build.filesystem = littlefs

; --- Library dependencies (pinned to ESP32-compatible versions) ---
lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
    bblanchon/ArduinoJson @ ^7.4.0

; --- Prevent wrong platform libraries from being pulled in ---
lib_ignore =
    AsyncTCP_RP2040W

; --- Build flags ---
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DBOARD_HAS_PSRAM=0

; --- Partition scheme with room for SPIFFS/LittleFS ---
board_build.partitions = default.csv
